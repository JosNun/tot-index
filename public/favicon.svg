<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark brown badge background -->
  <rect width="64" height="64" rx="10" fill="#2a1a10"/>
  <!-- Inner border ring -->
  <rect x="4" y="4" width="56" height="56" rx="7" fill="none" stroke="#d4a437" stroke-width="1.25"/>
  <!-- Decorative pinpricks at corners -->
  <circle cx="9" cy="9" r="1" fill="#d4a437"/>
  <circle cx="55" cy="9" r="1" fill="#d4a437"/>
  <circle cx="9" cy="55" r="1" fill="#d4a437"/>
  <circle cx="55" cy="55" r="1" fill="#d4a437"/>
  <!-- The tot (gold pill, angled) -->
  <g transform="rotate(-22 32 33)">
    <rect x="11" y="25" width="42" height="18" rx="9" fill="#b88a1f"/>
    <rect x="11" y="25" width="42" height="11" rx="6" fill="#d4a437"/>
    <rect x="14" y="26.5" width="36" height="3.5" rx="1.75" fill="#e8c266"/>
    <!-- Dimples/seasoning -->
    <ellipse cx="22" cy="36" rx="1.6" ry="1" fill="#8c5a18" opacity="0.7"/>
    <ellipse cx="32" cy="38" rx="1.4" ry="0.9" fill="#8c5a18" opacity="0.7"/>
    <ellipse cx="42" cy="36" rx="1.4" ry="0.9" fill="#8c5a18" opacity="0.7"/>
  </g>
  <!-- Council mark below -->
  <rect x="22" y="50" width="20" height="2" fill="#d4a437"/>
  <rect x="26" y="53" width="12" height="1" fill="#d4a437"/>
</svg>
